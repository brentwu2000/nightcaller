name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 允許在 GitHub Actions 頁面手動觸發

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: h5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: h5/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type-check + vite build)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: h5
          command: pages deploy dist --project-name=cheese-thief --branch=main
